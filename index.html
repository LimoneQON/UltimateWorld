<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Odyssey 3D - FPS</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <script>
        window.onerror = function(msg, url, line) { alert("BŁĄD: " + msg + "\nLinia: " + line); };
    </script>

    <div id="login-screen" class="fullscreen-ui">
        <div class="panel-box">
            <h1>FANTASY ODYSSEY</h1>
            <p style="color:#aaa;">Płynny Silnik 3D (FPS) & Moduły</p>
            <input type="text" id="acc-username" placeholder="Twój Login">
            <input type="password" id="acc-password" placeholder="Twoje Hasło">
            <button class="btn green" onclick="window.loginAccount()">Zaloguj się</button>
            <button class="btn" onclick="window.registerAccount()">Stwórz konto</button>
        </div>
    </div>

    <div id="main-menu" class="fullscreen-ui" style="display:none;">
        <div class="panel-box">
            <h1>MENU GŁÓWNE</h1>
            <p style="color:#5f5;">Witaj, <b id="logged-user-name"></b>!</p>
            <button class="btn gold" onclick="window.loadGame()">💾 Wczytaj Grę</button>
            <hr style="border-color:#334; margin: 20px 0;">
            <select id="diff-selector">
                <option value="1">Trudność: Łatwy</option>
                <option value="2" selected>Trudność: Normalny (Aktywne Potwory)</option>
            </select>
            <button class="btn green" onclick="window.startGameSingle()">Nowa Gra</button>
            <button class="btn red" onclick="window.logoutAccount()">Wyloguj</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <div id="scene">
            <div id="camera">
                <div id="world">
                    <div class="plane floor"></div>
                    <div class="plane ceil"></div>
                    <div id="world-content"></div>
                </div>
            </div>
        </div>

        <div id="weapon-view">👊</div>
        
        <div id="hud">
            <canvas id="minimap" width="180" height="180"></canvas>
            <div class="hud-stats">
                HP: <span id="ui-hp" style="color:#f55;">100</span> / <span id="ui-maxhp">100</span><br>
                Złoto: <span id="ui-coins" style="color:#fc0;">0</span><br>
                Piętro: <span id="ui-dlvl">1</span>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="hotbar-container">
            <div class="inv-grid hotbar" id="inv-hotbar"></div>
        </div>

        <div id="inventory-overlay" class="overlay-ui">
            <div class="panel-box" style="max-width: 600px; background:#c6c6c6; color:#000;">
                <h2 style="color:#333; border-bottom:2px solid #555;">PLECAK (E)</h2>
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
                    <div>Broń: <span id="ch-wep" style="color:#008;">Pięści</span></div>
                    <div>Zbroja: <span id="ch-arm" style="color:#008;">Szmaty</span></div>
                    <div>Pas: <span id="ch-belt" style="color:#800;">Brak (x5)</span></div>
                </div>
                <div class="inv-grid" id="inv-grid-main"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn" style="background:#555; color:#fff;" onclick="window.openCrafting()">Kowal</button>
                    <button class="btn" style="background:#262; color:#fff;" onclick="window.saveGame()">Zapisz</button>
                    <button class="btn" style="background:#822; color:#fff;" onclick="window.closeAllOverlays()">Zamknij</button>
                </div>
            </div>
        </div>

        <div id="crafting-overlay" class="overlay-ui">
            <div class="panel-box" style="background:#c6c6c6; color:#000; max-width:600px;">
                <h2 style="color:#333; border-bottom:2px solid #555;">KOWALSTWO</h2>
                <div id="craft-container" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left; max-height:400px; overflow-y:auto;"></div>
                <button class="btn" style="background:#555; color:#fff; margin-top:20px;" onclick="window.closeAllOverlays(); window.openOverlay('inventory-overlay');">Wróć do Plecaka</button>
            </div>
        </div>

        <div id="combat-overlay" class="overlay-ui">
            <div class="panel-box" style="max-width:600px;">
                <div class="combat-headers">
                    <div>
                        <h3 id="c-enemy-name" style="color:#fc0; margin:0 0 5px 0;">Potwór</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-enemy-hp-bar"></div></div>
                    </div>
                    <div>
                        <h3 style="color:#5f5; margin:0 0 5px 0;">Ty (HP: <span id="c-player-hp-text"></span>)</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-player-hp-bar" style="background:#0a0;"></div></div>
                    </div>
                </div>
                <div id="enemy-sprite">👹</div>
                <div class="combat-actions">
                    <button class="btn" onclick="window.combatAction('Zwykly')">Atak</button>
                    <button class="btn red" onclick="window.combatAction('Silny')">Mocny Cios</button>
                    <button class="btn green" onclick="window.combatAction('Mikstura')">Lecz</button>
                    <button class="btn gold" onclick="window.combatAction('Bomba')">Bomba</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
