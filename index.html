<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Fantasy Odyssey - Płynny Silnik FPP</title>
    <style>
        /* === BAZA === */
        body { margin: 0; background: #000; color: #eee; font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; overflow: hidden; user-select: none; }
        button { font-family: inherit; }

        /* === UI & OVERLAYS === */
        .fullscreen-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a24 0%, #020205 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .overlay-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(8px); }

        .panel-box { background: rgba(15,15,20,0.95); border: 2px solid #334; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #daaa00; font-size: 32px; margin-top: 0; text-shadow: 0 5px 15px rgba(218,170,0,0.4); text-transform: uppercase;}
        h2 { color: #5f5; margin-top: 0; border-bottom: 1px solid #334; padding-bottom: 10px; text-transform: uppercase;}

        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #0a0a0f; border: 1px solid #445; color: #fff; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #daaa00; }
        
        .btn { width: 100%; background: linear-gradient(180deg, #2a2a35 0%, #15151c 100%); color: #ddd; border: 1px solid #556; padding: 14px; margin: 6px 0; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { background: #334; transform: translateY(-2px); border-color: #fff; }
        .btn.gold { background: linear-gradient(to bottom, #540, #210); border-color: #fc0; color: #fc0; }
        .btn.green { background: linear-gradient(to bottom, #040, #020); border-color: #5f5; color: #5f5; }
        .btn.red { background: linear-gradient(to bottom, #500, #200); border-color: #f55; color: #f55; }

        /* === SILNIK 3D === */
        #game-view { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #050505; perspective: 600px; }
        #camera { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; }
        #world { position: absolute; left: 50%; top: 50%; transform-style: preserve-3d; }

        /* Płynne poruszanie bronią (Headbobbing dodany do broni, nie do kamery, co usuwa błąd spadania) */
        #weapon-view { position: absolute; bottom: -50px; right: 15%; font-size: 250px; filter: drop-shadow(-10px 10px 15px rgba(0,0,0,0.8)); transform-origin: bottom center; transition: 0.1s; z-index: 100; pointer-events: none; }
        .walking-bob { animation: weaponBob 0.6s infinite alternate ease-in-out; }
        @keyframes weaponBob { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(20px) rotate(5deg); } }
        .attacking { animation: swing 0.3s ease-in-out; }
        @keyframes swing { 0% { transform: rotate(0deg); } 50% { transform: rotate(-45deg) translate(-50px, -50px); } 100% { transform: rotate(0deg); } }

        /* Sufit i Podłoga */
        .plane { position: absolute; width: 6000px; height: 6000px; margin-left: -3000px; margin-top: -3000px; background-size: 300px 300px; }
        .floor { transform: translateY(150px) rotateX(90deg); background-image: repeating-linear-gradient(45deg, #1a1a20 25%, transparent 25%, transparent 75%, #1a1a20 75%, #1a1a20), repeating-linear-gradient(45deg, #1a1a20 25%, #15151c 25%, #15151c 75%, #1a1a20 75%, #1a1a20); background-position: 0 0, 150px 150px; background-size: 300px 300px; }
        .ceil { transform: translateY(-150px) rotateX(-90deg); background-color: #08080a; background-image: radial-gradient(#222 10%, transparent 11%); background-size: 300px 300px; }

        /* Ściany */
        .wall { position: absolute; width: 300px; height: 300px; margin-left: -150px; margin-top: -150px; background-color: #333; border: 2px solid #111; box-shadow: inset 0 0 60px rgba(0,0,0,0.8); backface-visibility: hidden; }
        .tex-human { background-image: linear-gradient(335deg, rgba(0,0,0,0.4) 23px, transparent 23px), linear-gradient(155deg, rgba(0,0,0,0.4) 23px, transparent 23px), linear-gradient(335deg, rgba(0,0,0,0.4) 23px, transparent 23px), linear-gradient(155deg, rgba(0,0,0,0.4) 23px, transparent 23px); background-size: 58px 58px; background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px; background-color: #444; }
        .tex-portal { background: radial-gradient(circle, #0ff 0%, #003 100%); box-shadow: 0 0 100px #0ff; opacity: 0.9; }
        .tex-exit { background: #222; display:flex; align-items:center; justify-content:center; }
        .wall-text { color: #fff; font-size: 30px; font-weight: bold; text-shadow: 0 0 10px #000; }

        /* Sprite'y 2D w 3D */
        .sprite { position: absolute; width: 300px; height: 300px; margin-left: -150px; margin-top: -150px; display: flex; align-items: center; justify-content: center; font-size: 140px; filter: drop-shadow(0 20px 30px rgba(0,0,0,1)); transform-style: preserve-3d; }

        /* === HUD & MINECRAFT INV === */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        .hud-stats { background: rgba(10,10,15,0.85); padding: 15px; border-radius: 8px; border: 1px solid #334; font-size: 16px; font-weight: bold; margin-top:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        canvas#minimap { background: rgba(5,5,8,0.9); border: 2px solid #445; border-radius: 8px; }
        #log-box { margin-top: 15px; width: 350px; height: 160px; overflow-y: hidden; background: rgba(10,10,15,0.85); padding: 15px; border-radius: 8px; border: 1px solid #334; font-size: 13px; line-height: 1.6; }
        .log-dmg { color: #f55; } .log-epic { color: #fc0; font-weight:bold; } .log-heal { color: #5f5; }

        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #c6c6c6; padding: 10px; border: 4px solid #373737; box-shadow: inset 2px 2px 0 #fff; margin-bottom: 15px;}
        .inv-grid.hotbar { grid-template-columns: repeat(9, 1fr); max-width: 600px; margin: 10px auto 0 auto; pointer-events: auto;}
        .inv-slot { width: 50px; height: 50px; background: #8b8b8b; position: relative; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; user-select: none; pointer-events: auto; border: 2px solid #373737; box-shadow: inset 3px 3px 0px rgba(0,0,0,0.6), inset -3px -3px 0px rgba(255,255,255,0.8);}
        .inv-slot:hover { background: #9c9c9c; }
        .inv-slot.active { outline: 3px solid #fff; box-shadow: inset 3px 3px 0px rgba(0,0,0,0.6), inset -3px -3px 0px rgba(255,255,255,0.9), inset 0 0 15px rgba(255,255,255,0.5); }
        .inv-count { position: absolute; bottom: 0px; right: 4px; font-size: 14px; font-weight: bold; color: #fff; text-shadow: 2px 2px 0 #000; font-family: monospace; }
        
        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }

        /* WALKA */
        .combat-headers { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px;}
        .combat-headers > div { flex: 1; background: #223; padding: 15px; border-radius: 8px; border: 1px solid #445; }
        .bar-bg { background: #111; width: 100%; height: 18px; border-radius: 9px; border: 2px solid #000; margin-top: 10px;}
        .bar-fill { height: 100%; background: #f00; transition: width 0.3s; }
        #enemy-sprite { font-size: 160px; margin: 20px 0; animation: breathe 1.5s infinite alternate ease-in-out; filter: drop-shadow(0 0 30px rgba(255,0,0,0.8)); }
        .combat-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.1) translateY(-15px); } }

        /* EKRAN ŚMIERCI */
        #death-screen { background: rgba(50,0,0,0.9); z-index: 9999; flex-direction: column;}
        #death-screen h1 { font-size: 80px; color: #f00; text-shadow: 0 0 30px #000; }
    </style>
</head>
<body>

    <div id="login-screen" class="fullscreen-ui">
        <div class="panel-box">
            <h1>FANTASY ODYSSEY</h1>
            <p style="color:#aaa;">Płynny Silnik 3D (FPS) & Ekwipunek</p>
            <input type="text" id="acc-username" placeholder="Login (min. 3 znaki)">
            <input type="password" id="acc-password" placeholder="Hasło">
            <button class="btn green" onclick="loginAccount()">Zaloguj się</button>
            <button class="btn" onclick="registerAccount()">Stwórz konto</button>
        </div>
    </div>

    <div id="main-menu" class="fullscreen-ui" style="display:none;">
        <div class="panel-box">
            <h1>MENU GŁÓWNE</h1>
            <p style="color:#5f5;">Witaj, <b id="logged-user-name"></b>!</p>
            <button class="btn gold" onclick="loadGame()">💾 Wczytaj Grę</button>
            <hr style="border-color:#334; margin: 20px 0;">
            <select id="diff-selector">
                <option value="1">Trudność: Łatwy (Potwory stoją)</option>
                <option value="2" selected>Trudność: Prawdziwy Czas (Aktywne Potwory)</option>
            </select>
            <button class="btn green" onclick="startGame()">Nowa Gra (Singleplayer)</button>
            <button class="btn red" onclick="logoutAccount()">Wyloguj</button>
        </div>
    </div>

    <div id="death-screen" class="fullscreen-ui" style="display:none;">
        <h1>ZGINĄŁEŚ</h1>
        <p style="color:#fff; font-size:20px; margin-bottom: 30px;">Twój bohater padł w mrokach lochów.</p>
        <button class="btn gold" style="max-width:300px;" onclick="location.reload()">Wróć do Menu</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="scene">
            <div id="camera">
                <div id="world">
                    <div class="plane floor"></div>
                    <div class="plane ceil"></div>
                    </div>
            </div>
        </div>

        <div id="weapon-view">👊</div>
        
        <div id="hud">
            <canvas id="minimap" width="180" height="180"></canvas>
            <div class="hud-stats">
                HP: <span id="ui-hp" style="color:#f55;">100</span> / <span id="ui-maxhp">100</span><br>
                Monety: <span id="ui-coins" style="color:#fc0;">0</span><br>
                Piętro: <span id="ui-dlvl">1</span>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="hotbar-container">
            <div class="inv-grid hotbar" id="inv-hotbar"></div>
        </div>

        <div id="inventory-overlay" class="overlay-ui">
            <div class="panel-box" style="max-width: 600px; background:#c6c6c6; color:#000;">
                <h2 style="color:#333; border-bottom:2px solid #555;">PLECAK (E)</h2>
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
                    <div>Broń: <span id="ch-wep" style="color:#008;">Pięści</span></div>
                    <div>Zbroja: <span id="ch-arm" style="color:#008;">Szmaty</span></div>
                    <div>Pas: <span id="ch-belt" style="color:#800;">Brak (Limit x5)</span></div>
                </div>
                <div class="inv-grid" id="inv-grid-main"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn" style="background:#555; color:#fff;" onclick="openOverlay('crafting-overlay')">Kowal (Crafting)</button>
                    <button class="btn" style="background:#262; color:#fff;" onclick="saveGame()">Zapisz Grę</button>
                    <button class="btn" style="background:#822; color:#fff;" onclick="closeOverlay('inventory-overlay')">Zamknij (E)</button>
                </div>
            </div>
        </div>

        <div id="crafting-overlay" class="overlay-ui">
            <div class="panel-box" style="background:#c6c6c6; color:#000; max-width:600px;">
                <h2 style="color:#333; border-bottom:2px solid #555;">KOWALSTWO</h2>
                <div id="craft-container" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;"></div>
                <button class="btn" style="background:#555; color:#fff; margin-top:20px;" onclick="openOverlay('inventory-overlay')">Wróć do Plecaka</button>
            </div>
        </div>

        <div id="combat-overlay" class="overlay-ui">
            <div class="panel-box" style="max-width:600px;">
                <div class="combat-headers">
                    <div>
                        <h3 id="c-enemy-name" style="color:#fc0; margin:0 0 5px 0;">Potwór</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-enemy-hp-bar"></div></div>
                    </div>
                    <div>
                        <h3 style="color:#5f5; margin:0 0 5px 0;">Ty (HP: <span id="c-player-hp-text"></span>)</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-player-hp-bar" style="background:#0a0;"></div></div>
                    </div>
                </div>
                <div id="enemy-sprite">👹</div>
                <div class="combat-actions">
                    <button class="btn" onclick="combatAction('Zwykly')">Zwykły Atak (LPM)</button>
                    <button class="btn red" onclick="combatAction('Silny')">Mocny Cios</button>
                    <button class="btn green" onclick="combatAction('Mikstura')">Lecz (Mikstura)</button>
                    <button class="btn gold" onclick="combatAction('Bomba')">Bomba</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 1. ZABEZPIECZONY SYSTEM KONT
    // ==========================================
    const STORAGE_KEY = 'fo_fps_v1'; 
    let currentUser = null;

    function getAccounts() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; } }
    function saveAccounts(accs) { localStorage.setItem(STORAGE_KEY, JSON.stringify(accs)); }

    function registerAccount() {
        let u = document.getElementById('acc-username').value.trim();
        let p = document.getElementById('acc-password').value.trim();
        if(u.length < 3) { alert("Login za krótki!"); return; }
        let accs = getAccounts();
        if(accs[u]) { alert("Konto istnieje!"); return; }
        accs[u] = { password: p, saveGame: null }; saveAccounts(accs); 
        alert("Utworzono konto. Logowanie..."); loginAccount();
    }

    function loginAccount() {
        let u = document.getElementById('acc-username').value.trim();
        let p = document.getElementById('acc-password').value.trim();
        let accs = getAccounts();
        if(accs[u] && accs[u].password === p) {
            currentUser = u;
            document.getElementById('login-screen').style.display = 'none'; 
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('logged-user-name').innerText = currentUser;
        } else { alert("Błędny login lub hasło!"); }
    }

    function logoutAccount() { currentUser = null; location.reload(); }

    // ==========================================
    // 2. BAZA DANYCH
    // ==========================================
    const ITEM_DB = {
        'wood': { sym: '🪵', name: 'Drewno' }, 'steel': { sym: '⛓️', name: 'Stal' },
        'fire': { sym: '🔥', name: 'Ogień' }, 'magic': { sym: '✨', name: 'Magia' },
        'pot': { sym: '🧪', name: 'Mikstura HP', use: (p)=>{ p.hp=Math.min(p.maxHp, p.hp+50); logMsg("Leczysz 50 HP.","log-heal"); } },
        'bomb': { sym: '💣', name: 'Bomba' }, 'key': { sym: '🔑', name: 'Klucz' }
    };

    const WEAPONS = [ {name: "Pięści", sym: "👊", dmg: 5}, {name: "Stalowy Miecz", sym: "🗡️", dmg: 15}, {name: "Topór", sym: "🪓", dmg: 35}, {name: "Kij Maga", sym: "🪄", dmg: 60} ];
    const ARMORS = [ {name: "Szmaty", def: 0}, {name: "Żelazna Zbroja", def: 15}, {name: "Mithril", def: 40} ];
    const BELTS = [ {name: "Brak", cap: 5}, {name: "Skórzany Pas", cap: 15}, {name: "Pas Tytanów", cap: 50} ];

    const RECIPES = [
        {name: "Skórzany Pas (Max Stack x15)", req: {wood: 5}, action: (p)=>{ p.belt = BELTS[1]; logMsg("Masz lepszy pas!"); }},
        {name: "Stalowy Miecz (+15 Dmg)", req: {steel: 3, wood: 1}, action: (p)=>{ p.weapon = WEAPONS[1]; updateWeaponView(); logMsg("Wykuto Miecz!"); }},
        {name: "Topór (+35 Dmg)", req: {steel: 10, fire: 5}, action: (p)=>{ p.weapon = WEAPONS[2]; updateWeaponView(); logMsg("Wykuto Topór!"); }},
        {name: "Żelazna Zbroja (+15 Def)", req: {steel: 8}, action: (p)=>{ p.armor = ARMORS[1]; logMsg("Wykuto Zbroję!"); }},
        {name: "Mikstura Leczenia", req: {magic: 1, wood: 1}, action: (p)=>{ addToInventory('pot', 1); logMsg("Uwarzono Miksturę!"); }},
        {name: "Bomba", req: {fire: 2, steel: 1}, action: (p)=>{ addToInventory('bomb', 1); logMsg("Zbudowano Bombę!"); }}
    ];

    const MOBS = [ {n: "Wilk", s: "🐺", hp: 30, d: 8}, {n: "Goblin", s: "👺", hp: 40, d: 12}, {n: "Demon", s: "👿", hp: 100, d: 25} ];

    // ==========================================
    // 3. STAN GRY I SILNIK FPS
    // ==========================================
    const MAP_SIZE = 20; const TILE_SIZE = 300;
    const T_WALL = 1, T_FLOOR = 0, T_EXIT = 3, T_PORTAL = 4;
    
    let map = [], entities = [], logs = [];
    let state = 'MENU', difficulty = 1;
    let currentLevel = 1, currentEnemy = null;
    let keys = {w:false, a:false, s:false, d:false};

    // Gracz porusza się swobodnie (zmiennoprzecinkowo)
    let player = {
        x: 1.5, z: 1.5, rot: 0, // rot to kąt w stopniach
        hp: 100, maxHp: 100, coins: 0, baseDmg: 0, baseArmor: 0,
        weapon: WEAPONS[0], armor: ARMORS[0], belt: BELTS[0],
        inventory: new Array(20).fill(null), selectedSlot: 0
    };

    function logMsg(msg, type='log-new') { logs.unshift(`<span class="${type}">• ${msg}</span><br>`); if(logs.length > 7) logs.pop(); document.getElementById('log-box').innerHTML = logs.join(''); }
    function closeOverlay(id) { state = 'EXPLORE'; document.getElementById(id).style.display = 'none'; keys={w:false,a:false,s:false,d:false}; }
    function openOverlay(id) { state = 'MENU'; document.getElementById(id).style.display = 'flex'; }

    // --- EKWIPUNEK ---
    function getInvCount(id) { return player.inventory.filter(i => i && i.id === id).reduce((sum, i) => sum + i.count, 0); }
    function removeInv(id, amount) {
        let rem = amount;
        for(let i = player.inventory.length - 1; i >= 0; i--) {
            if(player.inventory[i] && player.inventory[i].id === id) {
                if(player.inventory[i].count >= rem) {
                    player.inventory[i].count -= rem; if(player.inventory[i].count === 0) player.inventory[i] = null;
                    updateInventoryUI(); return true;
                } else { rem -= player.inventory[i].count; player.inventory[i] = null; }
            }
        } return false;
    }
    function addToInventory(id, amount) {
        let maxStack = player.belt.cap; let rem = amount;
        for(let i=0; i<20; i++) {
            if(player.inventory[i] && player.inventory[i].id === id && player.inventory[i].count < maxStack) {
                let space = maxStack - player.inventory[i].count;
                if(rem <= space) { player.inventory[i].count += rem; updateInventoryUI(); return true; }
                else { player.inventory[i].count = maxStack; rem -= space; }
            }
        }
        for(let i=0; i<20; i++) {
            if(!player.inventory[i]) {
                if(rem <= maxStack) { player.inventory[i] = {id: id, count: rem}; updateInventoryUI(); return true; }
                else { player.inventory[i] = {id: id, count: maxStack}; rem -= maxStack; }
            }
        }
        logMsg("Plecak pełny!", "log-dmg"); return false;
    }

    function updateInventoryUI() {
        let hotbarHTML = ''; let mainHTML = '';
        for(let i=0; i<20; i++) {
            let item = player.inventory[i];
            let sym = item ? ITEM_DB[item.id].sym : '';
            let cnt = item ? `<div class="inv-count">${item.count}</div>` : '';
            let html = `<div class="inv-slot ${i === player.selectedSlot ? 'active' : ''}" onclick="selectSlot(${i})">${sym}${cnt}</div>`;
            if(i < 9) hotbarHTML += html; else mainHTML += html;
        }
        document.getElementById('inv-hotbar').innerHTML = hotbarHTML;
        document.getElementById('inv-grid-main').innerHTML = mainHTML;
    }

    function selectSlot(idx) {
        player.selectedSlot = idx; let item = player.inventory[idx];
        if(item && ITEM_DB[item.id].use) { ITEM_DB[item.id].use(player); item.count--; if(item.count <= 0) player.inventory[idx] = null; } 
        updateInventoryUI(); updateHUD();
    }

    // --- GENEROWANIE MAPY ---
    function generateLevel() {
        map = []; entities = [];
        for(let z=0; z<MAP_SIZE; z++) { map[z] = []; for(let x=0; x<MAP_SIZE; x++) map[z][x] = T_WALL; }
        
        let cx = Math.floor(MAP_SIZE/2), cz = Math.floor(MAP_SIZE/2);
        map[cz][cx] = T_FLOOR; player.x = cx + 0.5; player.z = cz + 0.5; player.rot = 0;

        let floorCount = 0;
        while(floorCount < 150) {
            let d = Math.floor(Math.random()*4);
            if(d===0 && cz>2) cz--; else if(d===1 && cz<MAP_SIZE-3) cz++;
            else if(d===2 && cx>2) cx--; else if(d===3 && cx<MAP_SIZE-3) cx++;
            if(map[cz][cx] === T_WALL) { map[cz][cx] = T_FLOOR; floorCount++; }
        }

        let empty = () => { while(true) { let x=Math.floor(Math.random()*MAP_SIZE), z=Math.floor(Math.random()*MAP_SIZE); if(map[z][x]===T_FLOOR && (x!==Math.floor(player.x)||z!==Math.floor(player.z))) return {x,z}; } };
        
        let ex = empty(); map[ex.z][ex.x] = T_EXIT;
        let pm = empty(); map[pm.z][pm.x] = T_PORTAL;

        for(let i=0; i<4; i++) { let p=empty(); entities.push({x:p.x+0.5, z:p.z+0.5, sym: '🧪', id: 'pot'}); }
        for(let i=0; i<6; i++) { let p=empty(); entities.push({x:p.x+0.5, z:p.z+0.5, sym: '🪵', id: 'wood'}); }
        for(let i=0; i<4; i++) { let p=empty(); entities.push({x:p.x+0.5, z:p.z+0.5, sym: '⛓️', id: 'steel'}); }

        for(let i=0; i<5+currentLevel; i++) {
            let p = empty(); let mob = MOBS[Math.floor(Math.random()*MOBS.length)];
            entities.push({x:p.x+0.5, z:p.z+0.5, sym: mob.s, isEnemy: true, name: mob.n, hp: mob.hp, maxHp: mob.hp, dmg: mob.d});
        }

        buildCSS3D(); updateInventoryUI();
    }

    function createBlock(x, z, cls, html, container) {
        const faces = [ { rx: 0, ry: 0, tz: TILE_SIZE/2 }, { rx: 0, ry: 180, tz: TILE_SIZE/2 }, { rx: 0, ry: 90, tz: TILE_SIZE/2 }, { rx: 0, ry: -90, tz: TILE_SIZE/2 } ];
        faces.forEach(f => {
            let face = document.createElement('div'); face.className = cls; if(html) face.innerHTML = html;
            face.style.transform = `translate3d(${x*TILE_SIZE}px, 0, ${z*TILE_SIZE}px) rotateY(${f.ry}deg) translateZ(${f.tz}px)`;
            container.appendChild(face);
        });
    }

    function buildCSS3D() {
        let world = document.getElementById('world'); 
        // Zachowujemy podłogę i sufit, usuwamy resztę
        Array.from(world.children).forEach(c => { if(!c.classList.contains('plane')) world.removeChild(c); });

        for(let z=0; z<MAP_SIZE; z++) {
            for(let x=0; x<MAP_SIZE; x++) {
                let t = map[z][x];
                if(t !== T_FLOOR) {
                    let cls = `wall tex-human`; let html = "";
                    if(t === T_PORTAL) { cls += ' tex-portal'; html = "<div class='wall-text'>PORTAL</div>"; }
                    if(t === T_EXIT) { cls += ' tex-exit'; html = "<div class='wall-text'>WYJŚCIE</div>"; }
                    createBlock(x, z, cls, html, world);
                }
            }
        }
        // Sprites (Potwory i przedmioty)
        entities.forEach((e, idx) => {
            let s = document.createElement('div'); s.className = 'sprite'; s.innerHTML = e.sym; s.id = `ent_${idx}`;
            s.style.transform = `translate3d(${e.x*TILE_SIZE}px, 0, ${e.z*TILE_SIZE}px) rotateY(${-player.rot}deg)`;
            world.appendChild(s);
        });
        updateCamera();
    }

    // --- PĘTLA GRY (FPS MOVEMENT) ---
    function updateCamera() {
        let px = player.x * TILE_SIZE; let pz = player.z * TILE_SIZE;
        document.getElementById('camera').style.transform = `translateZ(150px) rotateY(${-player.rot}deg)`;
        document.getElementById('world').style.transform = `translate3d(${-px}px, 0, ${-pz}px)`;
        
        entities.forEach((e, idx) => {
            let el = document.getElementById(`ent_${idx}`);
            if(el) el.style.transform = `translate3d(${e.x*TILE_SIZE}px, 0, ${e.z*TILE_SIZE}px) rotateY(${player.rot}deg)`;
        });
    }

    function drawMinimap() {
        const mCtx = document.getElementById('minimap').getContext('2d');
        const W = 180; const TS = W / MAP_SIZE;
        mCtx.fillStyle = '#0a0a0f'; mCtx.fillRect(0, 0, W, W);
        for(let z=0; z<MAP_SIZE; z++) {
            for(let x=0; x<MAP_SIZE; x++) {
                if(map[z][x] === T_FLOOR) mCtx.fillStyle = '#334'; else if(map[z][x]===T_EXIT) mCtx.fillStyle='#aaa'; else if(map[z][x]===T_PORTAL) mCtx.fillStyle='#0ff'; else continue;
                mCtx.fillRect(x*TS, z*TS, TS+1, TS+1);
            }
        }
        entities.forEach(e => { mCtx.fillStyle = e.isEnemy ? '#f33' : '#fc0'; mCtx.fillRect(e.x*TS-1, e.z*TS-1, 4, 4); });
        
        mCtx.fillStyle = '#5f5'; mCtx.beginPath(); mCtx.arc(player.x*TS, player.z*TS, 3, 0, Math.PI*2); mCtx.fill();
        mCtx.beginPath(); mCtx.moveTo(player.x*TS, player.z*TS); mCtx.lineTo(player.x*TS + Math.sin(player.rot*Math.PI/180)*10, player.z*TS - Math.cos(player.rot*Math.PI/180)*10); mCtx.strokeStyle='#5f5'; mCtx.stroke();
    }

    let isMoving = false;
    function gameLoop() {
        if(state === 'EXPLORE') {
            let speed = 0.05; let rotSpeed = 3;
            if(keys.a) player.rot -= rotSpeed;
            if(keys.d) player.rot += rotSpeed;
            
            let nx = player.x, nz = player.z;
            let moved = false;
            
            if(keys.w) { nx += Math.sin(player.rot * Math.PI / 180) * speed; nz -= Math.cos(player.rot * Math.PI / 180) * speed; moved = true; }
            if(keys.s) { nx -= Math.sin(player.rot * Math.PI / 180) * speed; nz += Math.cos(player.rot * Math.PI / 180) * speed; moved = true; }

            // Animacja Broni (Headbob)
            let wep = document.getElementById('weapon-view');
            if(moved && !isMoving) { wep.classList.add('walking-bob'); isMoving = true; }
            else if(!moved && isMoving) { wep.classList.remove('walking-bob'); isMoving = false; }

            // Kolizje ze ścianami (Margo/Padding pozwala "ślizgać się" po ścianach)
            let margin = 0.2;
            if(map[Math.floor(player.z)][Math.floor(nx + (nx>player.x?margin:-margin))] === T_FLOOR) player.x = nx;
            if(map[Math.floor(nz + (nz>player.z?margin:-margin))][Math.floor(player.x)] === T_FLOOR) player.z = nz;

            // Sprawdzanie Interakcji (Porty, Itemy, Moby)
            let pxInt = Math.floor(player.x); let pzInt = Math.floor(player.z);
            if(map[pzInt][pxInt] === T_EXIT || map[pzInt][pxInt] === T_PORTAL) { currentLevel++; generateLevel(); }

            // Zbieranie i Walka (Proximity check)
            for(let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                let dist = Math.sqrt((player.x - e.x)**2 + (player.z - e.z)**2);
                if(dist < 0.8) {
                    if(!e.isEnemy) {
                        if(addToInventory(e.id, 1)) { logMsg(`Zebrałeś: ${ITEM_DB[e.id].name}`); document.getElementById(`ent_${i}`).remove(); entities.splice(i, 1); }
                    } else {
                        currentEnemy = e; openOverlay('combat-overlay');
                        document.getElementById('c-enemy-name').innerText = currentEnemy.name; document.getElementById('enemy-sprite').innerText = currentEnemy.sym;
                        updateCombatUI();
                    }
                }
            }
            
            updateCamera(); drawMinimap();
        }
        requestAnimationFrame(gameLoop);
    }

    // --- KONTROLA I INICJALIZACJA ---
    window.addEventListener('keydown', e => { 
        let k = e.key.toLowerCase(); 
        if(keys.hasOwnProperty(k)) keys[k] = true; 
        if(k==='e' && state==='EXPLORE') { openOverlay('inventory-overlay'); updateInventoryUI(); updateHUD(); }
        else if(k==='e' && state==='MENU') { closeOverlay('inventory-overlay'); closeOverlay('crafting-overlay'); }
        if(!isNaN(k) && k>0 && k<=9 && state==='EXPLORE') selectSlot(k-1);
    });
    window.addEventListener('keyup', e => { let k = e.key.toLowerCase(); if(keys.hasOwnProperty(k)) keys[k] = false; });
    
    // Atak LPM
    window.addEventListener('mousedown', () => {
        if(state === 'EXPLORE') {
            let wep = document.getElementById('weapon-view');
            wep.classList.add('attacking');
            setTimeout(() => wep.classList.remove('attacking'), 300);
        }
    });

    function updateWeaponView() { document.getElementById('weapon-view').innerText = player.weapon.sym; }

    function startGame() {
        document.getElementById('main-menu').style.display = 'none'; document.getElementById('game-view').style.display = 'block';
        player.hp = 100; player.inventory.fill(null); addToInventory('pot', 2);
        updateWeaponView(); generateLevel(); state = 'EXPLORE';
        requestAnimationFrame(gameLoop);
    }

    function saveGame() {
        if(!currentUser) return;
        const gameState = { player, map, entities, currentLevel, logs };
        let accs = getAccounts(); accs[currentUser].saveGame = gameState; saveAccounts(accs);
        logMsg(`💾 Gra zapisana!`, "log-epic");
    }

    function loadGame() {
        if(!currentUser) return;
        let accs = getAccounts(); let s = accs[currentUser].saveGame;
        if(!s) { alert(`Brak zapisu!`); return; }
        player = s.player; map = s.map; entities = s.entities; currentLevel = s.currentLevel; logs = s.logs || [];
        document.getElementById('main-menu').style.display = 'none'; document.getElementById('game-view').style.display = 'block';
        updateWeaponView(); buildCSS3D(); state = 'EXPLORE'; requestAnimationFrame(gameLoop);
        logMsg(`💾 Wczytano grę.`, "log-epic");
    }

    // --- SYSTEM KOWALA I WALKA ---
    function updateHUD() {
        document.getElementById('ui-hp').innerText = Math.floor(player.hp); document.getElementById('ui-maxhp').innerText = player.maxHp;
        document.getElementById('ui-coins').innerText = player.coins; document.getElementById('ui-dlvl').innerText = currentLevel;
        document.getElementById('ch-wep').innerText = player.weapon.name; document.getElementById('ch-arm').innerText = player.armor.name; document.getElementById('ch-belt').innerText = `${player.belt.name} (Max x${player.belt.cap})`;
    }

    function openCrafting() {
        openOverlay('crafting-overlay'); let c = document.getElementById('craft-container'); c.innerHTML = '';
        RECIPES.forEach((r, idx) => {
            let reqStr = Object.entries(r.req).map(([k, v]) => `${ITEM_DB[k].name}:${v}`).join(', ');
            c.innerHTML += `<div style="background:#8b8b8b; color:#111; padding:10px; border:2px solid #373737; font-weight:bold; cursor:pointer;" onclick="craft(${idx})"><b>${r.name}</b><br><span style="font-size:11px;">${reqStr}</span></div>`;
        });
    }

    function craft(idx) {
        let r = RECIPES[idx]; let canCraft = true;
        for(let key in r.req) { if(getInvCount(key) < r.req[key]) canCraft = false; }
        if(canCraft) { for(let key in r.req) removeInv(key, r.req[key]); r.action(player); openCrafting(); updateHUD(); } 
        else logMsg("Brak surowców!", "log-dmg");
    }

    function updateCombatUI() { document.getElementById('c-enemy-hp-bar').style.width = Math.max(0, (currentEnemy.hp / currentEnemy.maxHp) * 100) + '%'; document.getElementById('c-player-hp-bar').style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%'; document.getElementById('c-player-hp-text').innerText = Math.floor(player.hp); }

    function combatAction(action) {
        let wep = document.getElementById('weapon-view'); wep.classList.add('attacking'); setTimeout(() => wep.classList.remove('attacking'), 300);
        let dmg = player.baseDmg + player.weapon.dmg; let arm = player.baseArmor + player.armor.def;

        if(action === 'Zwykly') { currentEnemy.hp -= dmg; logMsg(`Zadajesz ${dmg} obr.`); }
        if(action === 'Silny') { if(Math.random()<0.5) { currentEnemy.hp -= dmg*2; logMsg(`KRYTYK! ${dmg*2} obr!`, "log-epic"); } else logMsg("Pudło!", "log-dmg"); }
        if(action === 'Bomba') { if(removeInv('bomb', 1)) { currentEnemy.hp -= 100; logMsg("BUM! 100 obr!"); } else { logMsg("Brak bomb!"); return; } }
        if(action === 'Mikstura') { if(removeInv('pot', 1)) { player.hp = Math.min(player.maxHp, player.hp+50); logMsg("Leczysz się."); } else return; }
        if(action === 'Ucieczka') { if(Math.random()<0.6) { closeOverlay('combat-overlay'); player.x-=0.5; player.z-=0.5; return; } else logMsg("Ucieczka nieudana!"); }

        if(currentEnemy.hp <= 0) {
            logMsg(`Zwycięstwo! +25 monet.`, "log-heal"); player.coins += 25;
            let el = document.getElementById(`ent_${entities.indexOf(currentEnemy)}`); if(el) el.remove();
            entities.splice(entities.indexOf(currentEnemy), 1); closeOverlay('combat-overlay'); currentEnemy = null; updateHUD(); return;
        }

        let enemyDmg = Math.max(1, (currentEnemy.dmg + Math.floor(Math.random()*5)) - arm); player.hp -= enemyDmg; logMsg(`Otrzymujesz ${enemyDmg} obr!`, "log-dmg"); 
        if(player.hp <= 0) { player.hp = 0; logMsg("💀 ZGINĄŁEŚ!"); document.getElementById('combat-overlay').style.display='none'; document.getElementById('death-screen').style.display='flex'; }
        updateCombatUI(); updateHUD();
    }
</script>
