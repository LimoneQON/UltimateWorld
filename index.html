<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Fantasy Odyssey 3D - Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>

    <script>
        window.onerror = function(msg, url, line) {
            alert("BŁĄD GRY!\nWiadomość: " + msg + "\nLinia: " + line);
        };
    </script>

    <div id="login-screen" class="fullscreen-ui">
        <div class="panel-box">
            <h1>FANTASY ODYSSEY</h1>
            <p style="color:#aaa; font-size:14px; margin-bottom:20px;">Wersja Modułowa (Multi-File)</p>
            <input type="text" id="acc-username" placeholder="Login (min. 3 znaki)">
            <input type="password" id="acc-password" placeholder="Hasło (min. 3 znaki)">
            <button class="btn green" onclick="window.loginAccount()">Zaloguj się</button>
            <button class="btn" onclick="window.registerAccount()">Stwórz konto</button>
        </div>
    </div>

    <div id="main-menu" class="fullscreen-ui" style="display:none;">
        <div class="panel-box" style="max-width: 500px;">
            <h1>WŁADCA ŚWIATÓW</h1>
            <p style="color:#5f5; font-size:16px;">Zalogowano: <b id="logged-user-name"></b></p>
            
            <button class="btn gold" onclick="window.loadGame()">💾 Wczytaj Zapisaną Grę</button>
            <div style="margin: 20px 0; border-top: 1px solid #334; padding-top: 20px;">
                <select id="diff-selector">
                    <option value="1">Trudność: Klasyczna (Turowa)</option>
                    <option value="2" selected>Trudność: Czas Rzeczywisty (Potwory same chodzą!)</option>
                    <option value="3">Trudność: HARDCORE (Permadeath)</option>
                </select>
                <label class="checkbox"><input type="checkbox" id="mode-18plus"> Tryb 18+ (Ryzykowne przygody)</label>
                <button class="btn green" onclick="window.startGameSingle()">Nowa Gra</button>
            </div>
            <button class="btn red" onclick="window.logoutAccount()">Wyloguj się</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <div class="scanlines"></div>
        <div id="scene">
            <div id="camera">
                <div id="world">
                    </div>
            </div>
        </div>
        
        <div id="hud">
            <div class="hud-top">
                <canvas id="minimap" width="180" height="180"></canvas>
                <div class="hud-stats">
                    HP: <span id="ui-hp" style="color:#f55;">100</span> / <span id="ui-maxhp">100</span><br>
                    Monety: <span id="ui-coins" style="color:#fc0;">0</span> 🪙<br>
                    Świat: <span id="ui-worldname" style="color:#5f5;">-</span><br>
                    Piętro: <span id="ui-dlvl">1</span>
                </div>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="mobile-controls">
            <div></div> <button class="dpad-btn" onclick="window.movePlayer('FORWARD')">W</button> <div></div>
            <button class="dpad-btn" onclick="window.movePlayer('LEFT')">A</button> <button class="dpad-btn" onclick="window.movePlayer('BACK')">S</button> <button class="dpad-btn" onclick="window.movePlayer('RIGHT')">D</button>
        </div>

        <div id="hotbar-container">
            <div class="inv-grid hotbar" id="inv-hotbar">
                </div>
        </div>

        <div id="inventory-overlay" class="overlay-ui">
            <div class="inv-panel">
                <h2>PLECAK I PROFIL (E)</h2>
                <div style="display:flex; justify-content:space-between; color:#aaa; font-size:14px; margin-bottom:15px; background:#111; padding:10px; border-radius:6px; border:1px solid #334;">
                    <div>Broń: <b id="ch-wep" style="color:#fff;">Pięści</b></div>
                    <div>Zbroja: <b id="ch-arm" style="color:#fff;">Szmaty</b></div>
                    <div>Pas: <b id="ch-belt" style="color:#0ff;">Brak (Limit x5)</b></div>
                </div>
                <div class="inv-grid" id="inv-grid-main">
                    </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn gold" onclick="window.openCrafting()">Kowalstwo</button>
                    <button class="btn blue" onclick="window.saveGame()">Zapisz Grę</button>
                    <button class="btn" onclick="window.closeOverlay('inventory-overlay')">Wróć (E)</button>
                </div>
            </div>
        </div>

        <div id="combat-overlay" class="overlay-ui">
            <div class="combat-panel">
                <div class="combat-headers">
                    <div>
                        <h3 id="c-enemy-name" style="color:#fc0; margin:0 0 10px 0;">Potwór</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-enemy-hp-bar"></div></div>
                    </div>
                    <div>
                        <h3 style="color:#5f5; margin:0 0 10px 0;">Ty (HP: <span id="c-player-hp-text"></span>)</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-player-hp-bar" style="background:#0a0;"></div></div>
                    </div>
                </div>
                <div id="enemy-sprite">👹</div>
                <div class="combat-actions">
                    <button class="btn" onclick="window.combatAction('Zwykly')">Zwykły Atak</button>
                    <button class="btn red" onclick="window.combatAction('Silny')">Mocny Cios</button>
                    <button class="btn green" onclick="window.combatAction('Mikstura')">Wypij Miksturę</button>
                    <button class="btn gold" onclick="window.combatAction('Bomba')">Rzuć Bombę</button>
                    <button class="btn" style="grid-column: span 2;" onclick="window.combatAction('Ucieczka')">Ucieczka</button>
                </div>
            </div>
        </div>

        <div id="crafting-overlay" class="overlay-ui">
            <div class="inv-panel">
                <h2 style="color:#fc0;">🔨 KOWALSTWO</h2>
                <div id="craft-container" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;"></div>
                <button class="btn" style="margin-top:20px;" onclick="window.closeOverlay('crafting-overlay')">Wyjdź</button>
            </div>
        </div>
        
        <div id="portal-overlay" class="overlay-ui">
            <div class="panel-box">
                <h2 style="color:#0ff;">🌌 BRAMA WYMIARÓW</h2>
                <button class="btn" onclick="window.travelToWorld('human')">Ludzkie Królestwa</button>
                <button class="btn" onclick="window.travelToWorld('elf')">Świat Elfów</button>
                <button class="btn" onclick="window.travelToWorld('dwarf')">Krasnoludy</button>
                <button class="btn" onclick="window.travelToWorld('homunculus')">Homunkulusy</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
