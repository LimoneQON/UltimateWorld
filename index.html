<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Fantasy Odyssey 3D - Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="login-screen" class="fullscreen-ui">
        <div class="panel-box">
            <h1>FANTASY ODYSSEY 3D</h1>
            <p>Zaloguj się, aby zsynchronizować zapisy.</p>
            <input type="text" id="acc-username" placeholder="Login">
            <input type="password" id="acc-password" placeholder="Hasło">
            <button class="btn gold" onclick="loginAccount()">Zaloguj się</button>
            <button class="btn" onclick="registerAccount()">Stwórz konto</button>
        </div>
    </div>

    <div id="main-menu" class="fullscreen-ui" style="display:none;">
        <div class="panel-box">
            <h1>WŁADCA ŚWIATÓW</h1>
            <p style="color:#5f5;">Witaj, <span id="logged-user-name"></span></p>
            
            <button class="btn green" onclick="loadGame()">💾 Wczytaj Grę</button>
            <hr>
            <select id="diff-selector">
                <option value="1">Trudność: Normalny</option>
                <option value="2" selected>Trudność: Czas Rzeczywisty (Potwory chodzą!)</option>
                <option value="3">Trudność: HARDCORE</option>
            </select>
            <label class="checkbox"><input type="checkbox" id="mode-18plus"> Tryb 18+ (Używki, Kurtyzany)</label>
            <button class="btn gold" onclick="startGameSingle()">Nowa Gra (Singleplayer)</button>
            <hr>
            <h3>Kooperacja (P2P)</h3>
            <button class="btn blue" onclick="hostGame()">Załóż Pokój (HOST)</button>
            <input type="text" id="join-id" placeholder="Wklej ID hosta...">
            <button class="btn blue" onclick="joinGame()">Dołącz do Gry</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <div id="scene">
            <div id="camera">
                <div id="world">
                    </div>
            </div>
        </div>
        
        <div id="hud">
            <div class="hud-top">
                <div class="hud-stats">
                    HP: <span id="ui-hp" style="color:#f55; font-weight:bold;">100</span> | 
                    Świat: <span id="ui-worldname" style="color:#5f5;">Ludzkie Królestwa</span> | 
                    Piętro: <span id="ui-dlvl">1</span>
                </div>
                <canvas id="minimap" width="150" height="150"></canvas>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="combat-overlay" class="overlay-ui" style="display:none;">
            <div class="combat-panel">
                <div class="combat-headers">
                    <div>
                        <h3 id="c-enemy-name" style="color:#fc0;">Potwór</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-enemy-hp-bar"></div></div>
                    </div>
                    <div>
                        <h3 style="color:#5f5;">Ty</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-player-hp-bar" style="background:#0a0;"></div></div>
                    </div>
                </div>
                <div id="enemy-sprite">👹</div>
                <div class="combat-actions">
                    <button class="btn" onclick="combatAction('Zwykly')">Atak</button>
                    <button class="btn red" onclick="combatAction('Silny')">Mocny</button>
                    <button class="btn blue" onclick="combatAction('Mikstura')">Lecz</button>
                    <button class="btn" onclick="combatAction('Bomba')">Bomba</button>
                    <button class="btn" onclick="combatAction('Ucieczka')">Ucieczka</button>
                </div>
            </div>
        </div>

        <div id="portal-overlay" class="overlay-ui" style="display:none;">
            <div class="panel-box">
                <h2 style="color:#0ff;">🌌 WYBIERZ WYMIAR</h2>
                <button class="btn" onclick="travelToWorld('human')">Ludzkie Królestwa</button>
                <button class="btn" onclick="travelToWorld('elf')">Świat Elfów</button>
                <button class="btn" onclick="travelToWorld('dwarf')">Krasnoludy</button>
                <button class="btn" onclick="travelToWorld('homunculus')">Homunkulusy</button>
            </div>
        </div>

        <div id="inventory-overlay" class="overlay-ui" style="display:none;">
            <div class="inv-panel">
                <h2>PLECAK</h2>
                <div class="inv-grid" id="inv-grid-main">
                    </div>
                <div style="display:flex; justify-content:space-between; margin-top:15px;">
                    <button class="btn gold" onclick="openCrafting()">Kowalstwo</button>
                    <button class="btn" onclick="document.getElementById('inventory-overlay').style.display='none'">Zamknij (E)</button>
                </div>
            </div>
        </div>

        <div id="hotbar-container">
            <div class="inv-grid hotbar" id="inv-hotbar">
                </div>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
