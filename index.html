<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Odyssey 3D - Raycaster Engine</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="login-screen" class="fullscreen-ui">
        <div class="panel-box">
            <h1>FANTASY ODYSSEY</h1>
            <p style="color:#aaa;">Prawdziwy Silnik Raycaster (Wolfenstein 3D Style)</p>
            <input type="text" id="acc-username" placeholder="Twój Login (min. 3 znaki)">
            <input type="password" id="acc-password" placeholder="Hasło (min. 3 znaki)">
            <button id="btn-login" class="btn green">Zaloguj się</button>
            <button id="btn-register" class="btn">Stwórz konto</button>
        </div>
    </div>

    <div id="main-menu" class="fullscreen-ui" style="display:none;">
        <div class="panel-box">
            <h1>MENU GŁÓWNE</h1>
            <p style="color:#5f5;">Witaj, <b id="logged-user-name"></b>!</p>
            <button id="btn-load" class="btn gold">💾 Wczytaj Grę</button>
            <hr style="border-color:#334; margin: 20px 0;">
            <select id="diff-selector">
                <option value="1">Trudność: Łatwy (Potwory stoją)</option>
                <option value="2" selected>Trudność: Normalny (Gonitwa)</option>
            </select>
            <button id="btn-new-game" class="btn green">Nowa Gra</button>
            <button id="btn-logout" class="btn red">Wyloguj</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="weapon-view">👊</div>
        
        <div id="hud">
            <canvas id="minimap" width="160" height="160"></canvas>
            <div class="hud-stats">
                HP: <span id="ui-hp" style="color:#f55;">100</span> / <span id="ui-maxhp">100</span><br>
                Złoto: <span id="ui-coins" style="color:#fc0;">0</span><br>
                Piętro: <span id="ui-dlvl">1</span>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="hotbar-container">
            <div class="inv-grid hotbar" id="inv-hotbar"></div>
        </div>

        <div id="inventory-overlay" class="overlay-ui">
            <div class="panel-box" style="max-width: 600px; background:#c6c6c6; color:#000;">
                <h2 style="color:#333; border-bottom:2px solid #555;">PLECAK (E)</h2>
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
                    <div>Broń: <span id="ch-wep" style="color:#008;">Pięści</span></div>
                    <div>Zbroja: <span id="ch-arm" style="color:#008;">Szmaty</span></div>
                    <div>Pas: <span id="ch-belt" style="color:#800;">Brak (x5)</span></div>
                </div>
                <div class="inv-grid" id="inv-grid-main"></div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button id="btn-open-crafting" class="btn" style="background:#555; color:#fff;">Kowal</button>
                    <button id="btn-save-game" class="btn" style="background:#262; color:#fff;">Zapisz</button>
                    <button id="btn-close-inv" class="btn" style="background:#822; color:#fff;">Zamknij</button>
                </div>
            </div>
        </div>

        <div id="crafting-overlay" class="overlay-ui">
            <div class="panel-box" style="background:#c6c6c6; color:#000; max-width:600px;">
                <h2 style="color:#333; border-bottom:2px solid #555;">KOWALSTWO</h2>
                <div id="craft-container" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left; max-height:400px; overflow-y:auto;"></div>
                <button id="btn-close-crafting" class="btn" style="background:#555; color:#fff; margin-top:20px;">Wróć</button>
            </div>
        </div>

        <div id="combat-overlay" class="overlay-ui">
            <div class="panel-box" style="max-width:600px;">
                <div class="combat-headers">
                    <div>
                        <h3 id="c-enemy-name" style="color:#fc0; margin:0 0 5px 0;">Potwór</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-enemy-hp-bar"></div></div>
                    </div>
                    <div>
                        <h3 style="color:#5f5; margin:0 0 5px 0;">Ty (HP: <span id="c-player-hp-text"></span>)</h3>
                        <div class="bar-bg"><div class="bar-fill" id="c-player-hp-bar" style="background:#0a0;"></div></div>
                    </div>
                </div>
                <div id="enemy-sprite">👹</div>
                <div class="combat-actions">
                    <button id="btn-combat-atk" class="btn">Atak (LPM)</button>
                    <button id="btn-combat-str" class="btn red">Mocny Cios</button>
                    <button id="btn-combat-heal" class="btn green">Lecz</button>
                    <button id="btn-combat-bomb" class="btn gold">Bomba</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
